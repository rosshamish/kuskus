name: kusto-extensions-pack-pr-validation

on:
  pull_request:
    branches:
      - master
    paths:
      - 'kusto-extensions-pack/**'
      - '.github/workflows/kusto-extensions-pack-pr-validation.yml'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kusto-extensions-pack

    steps:
      # extensions-pack is a pure manifest (no deps, no build). Nothing to validate locally.
      # CI validates at publish time via vsce package.
      - uses: actions/checkout@v4
