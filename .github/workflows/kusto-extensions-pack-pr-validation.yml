name: kusto-extensions-pack-pr-validation

on:
  pull_request:
    branches:
      - master
    paths:
      - 'kusto-extensions-pack/**'
      - '.github/workflows/kusto-extensions-pack-pr-validation.yml'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kusto-extensions-pack

    steps:
      # extensions-pack is a pure manifest (no deps, no build). Nothing to validate locally.
      # CI validates at publish time via vsce package.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Detect publish-triggering changes
        id: publish-trigger
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files: |
            kusto-extensions-pack/**
            .github/workflows/kusto-extensions-pack-publish.yml

      - name: Check version bump
        id: check-version-bump
        if: steps.publish-trigger.outputs.any_changed == 'true'
        uses: del-systems/check-if-version-bumped@d5d13ffd75dc8aa9c2e1dca10d9bb27be10307b2 # v2
        with:
          path: kusto-extensions-pack/package.json

      - name: Version bump required
        if: failure()
        run: |
          echo "ERROR: kusto-extensions-pack/package.json version not bumped."
          echo "  Fix: cd kusto-extensions-pack && npm version patch --no-git-tag-version"
          echo "  Docs: .github/skills/kuskus-version-bump/SKILL.md"
          exit 1

