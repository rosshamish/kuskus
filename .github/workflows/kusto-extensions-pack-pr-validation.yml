name: kusto-extensions-pack-pr-validation

on:
  pull_request:
    branches:
      - master
    paths:
      - 'kusto-extensions-pack/**'
      - '.github/workflows/kusto-extensions-pack-pr-validation.yml'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kusto-extensions-pack

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Validate manifest fields
        run: |
          node -e "
            const p = require('./package.json');
            if (!p.extensionPack?.length) { console.error('extensionPack is empty'); process.exit(1); }
            if (!p.publisher) { console.error('publisher not set'); process.exit(1); }
            console.log('Manifest valid: publisher=' + p.publisher + ', extensionPack=' + p.extensionPack.length + ' extensions');
          "
