name: kusto-extensions-pack-pr-validation

on:
  pull_request:
    branches:
      - master
    paths:
      - 'kusto-extensions-pack/**'
      - '.github/workflows/kusto-extensions-pack-pr-validation.yml'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kusto-extensions-pack

    steps:
      # extensions-pack is a pure manifest (no deps, no build). Nothing to validate locally.
      # CI validates at publish time via vsce package.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Fetch origin/master for version comparison
        run: git fetch origin master --depth=1
        working-directory: ${{ github.workspace }}

      - name: Check version bump
        run: bash .github/scripts/check-version-bump.sh kusto-extensions-pack
        working-directory: ${{ github.workspace }}
