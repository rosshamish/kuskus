name: kusto-extensions-pack-pr-validation

on:
  pull_request:
    branches:
      - master
    paths:
      - 'kusto-extensions-pack/**'
      - '.github/workflows/kusto-extensions-pack-pr-validation.yml'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kusto-extensions-pack

    steps:
      # extensions-pack is a pure manifest (no deps, no build). Nothing to validate locally.
      # CI validates at publish time via vsce package.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Detect publish-triggering changes
        id: publish-trigger
        uses: tj-actions/changed-files@v46
        with:
          files: |
            kusto-extensions-pack/**
            .github/workflows/kusto-extensions-pack-publish.yml

      - name: Check version bump
        if: steps.publish-trigger.outputs.any_changed == 'true'
        uses: del-systems/check-if-version-bumped@v2
        with:
          path: kusto-extensions-pack/package.json

