name: kusto-mcp-server-pr-validation

on:
  pull_request:
    branches:
      - master
    paths:
      - 'kusto-mcp-server/**'
      - '.github/workflows/kusto-mcp-server-pr-validation.yml'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kusto-mcp-server

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
