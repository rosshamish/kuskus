name: kusto-language-server-publish

on:
  push:
    branches:
      - master
    paths:
      - 'kusto-language-server/**'
      - '.github/workflows/kusto-language-server-publish.yml'
  
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kusto-language-server

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name:  'Automated Version Bump'
        uses:  ./.github/actions/gh-action-bump-version-master
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN_GITHUB }}
          PACKAGEJSON_DIR:  'kusto-language-server'
        with:
          default: patch
          tag-prefix: kusto-language-server-v
          # Don't push this commit, because we might not have latest master.
          # We'll fetch, merge, and push at the end.
          push: false

      - run: npm ci

      - name: Inject telemetry key
        # KUSKUS_AI_KEY is a write-only App Insights connection string — not a secret in the
        # traditional sense, but stored in GitHub Secrets to keep it out of source control.
        # Replaces the __KUSKUS_AI_KEY__ placeholder in the compiled client output.
        # If the secret is absent (forks, PRs), the placeholder remains and telemetry is disabled.
        env:
          KUSKUS_AI_KEY: ${{ secrets.KUSKUS_AI_KEY }}
        run: |
          if [ -n "$KUSKUS_AI_KEY" ]; then
            find client/out -name "telemetry.js" -exec \
              sed -i "s|__KUSKUS_AI_KEY__|${KUSKUS_AI_KEY}|g" {} \;
            echo "Telemetry key injected."
          else
            echo "KUSKUS_AI_KEY not set — telemetry disabled in this build."
          fi

      - name: Publish VS Code Extension
        uses: HaaLeo/publish-vscode-extension@v1
        with:
          pat: ${{ secrets.VS_MARKETPLACE_TOKEN }}
          registryUrl: https://marketplace.visualstudio.com
          packagePath: ./kusto-language-server

      - name: Push version bump commit
        uses: ./.github/actions/pull-rebase-then-push
        with:
          max-retries: 5
          remote-name: origin
          branch: master
