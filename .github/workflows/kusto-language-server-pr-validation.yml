name: kusto-language-server-pr-validation

on:
  pull_request:
    branches:
      - master
    paths:
      - 'kusto-language-server/**'
      - '.github/workflows/kusto-language-server-pr-validation.yml'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kusto-language-server

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Detect publish-triggering changes
        id: publish-trigger
        uses: tj-actions/changed-files@v46
        with:
          files: |
            kusto-language-server/**
            .github/workflows/kusto-language-server-publish.yml

      - name: Check version bump
        id: check-version-bump
        if: steps.publish-trigger.outputs.any_changed == 'true'
        uses: del-systems/check-if-version-bumped@v2
        with:
          path: kusto-language-server/package.json

      - name: Version bump required
        if: failure()
        run: |
          echo "ERROR: kusto-language-server/package.json version not bumped."
          echo "  Fix: cd kusto-language-server && npm version patch --no-git-tag-version"
          echo "  Docs: .github/skills/kuskus-version-bump/SKILL.md"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run lint
      - run: npm run vscode:prepublish
