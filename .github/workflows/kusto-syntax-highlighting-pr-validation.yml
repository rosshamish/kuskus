name: kusto-syntax-highlighting-pr-validation

on:
  pull_request:
    branches:
      - master
    paths:
      - 'kusto-syntax-highlighting/**'
      - '.github/workflows/kusto-syntax-highlighting-pr-validation.yml'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kusto-syntax-highlighting

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Detect publish-triggering changes
        id: publish-trigger
        uses: tj-actions/changed-files@ed68ef82c095e0d48ec87eccea555d944a631a4c # v46
        with:
          files: |
            kusto-syntax-highlighting/**
            .github/workflows/kusto-syntax-highlighting-publish.yml

      - name: Check version bump
        id: check-version-bump
        if: steps.publish-trigger.outputs.any_changed == 'true'
        uses: del-systems/check-if-version-bumped@d5d13ffd75dc8aa9c2e1dca10d9bb27be10307b2 # v2
        with:
          path: kusto-syntax-highlighting/package.json

      - name: Version bump required
        if: failure()
        run: |
          echo "ERROR: kusto-syntax-highlighting/package.json version not bumped."
          echo "  Fix: cd kusto-syntax-highlighting && npm version patch --no-git-tag-version"
          echo "  Docs: .github/skills/kuskus-version-bump/SKILL.md"
          exit 1

      - run: npm ci
      - run: npm run test
