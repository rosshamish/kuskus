name: kusto-syntax-highlighting-pr-validation

on:
  pull_request:
    branches:
      - master
    paths:
      - 'kusto-syntax-highlighting/**'
      - '.github/workflows/kusto-syntax-highlighting-pr-validation.yml'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kusto-syntax-highlighting

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Fetch origin/master for version comparison
        run: git fetch origin master --depth=1
        working-directory: ${{ github.workspace }}

      - name: Check version bump
        run: bash .github/scripts/check-version-bump.sh kusto-syntax-highlighting
        working-directory: ${{ github.workspace }}

      - run: npm ci
      - run: npm run test
