name: 'Verify Kusto Color Themes'
description: 'Validates that all contributed themes in package.json exist as files on disk'
inputs:
  working-directory: 
    description: 'Working directory where package.json can be found'
    default: '.'
runs:
  using: "composite"
  steps: 
    - name: Extract contributed themes from package.json
      id: themes
      shell: bash
      env:
        WORKING_DIR: ${{ inputs.working-directory }}
      run: |
        value=$(jq '.contributes.themes[].path' "$WORKING_DIR/package.json" --raw-output)
        echo "value<<EOF" >> "$GITHUB_OUTPUT"
        echo "$value" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"
    - name: Verify each contributed theme exists
      shell: bash
      env:
        WORKING_DIR: ${{ inputs.working-directory }}
        THEMES: ${{ steps.themes.outputs.value }}
      run: |
        errors=0
        for theme in $THEMES; do
          filepath="$WORKING_DIR/$theme"
          if ! test -f "$filepath"; then
            echo "ERROR: File not found: $filepath"
            errors=$((errors+1))
          fi
        done
        # Exit 1 on any failure, 0 on success. Avoid exit-code overflow (bash exit is mod 256).
        exit $((errors > 0 ? 1 : 0))
