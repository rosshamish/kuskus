name: 'Pull Rebase Then Push'
description: 'Retries git pull --rebase and push to handle concurrent pushes to master'
inputs:
  max-retries: 
    description: 'Max number of retries'
    default: 3
  remote-name:
    description: 'Remote name to pull from, e.g. origin'
    default: origin
  branch:
    description: 'Branch to pull from, e.g. main'
    default: master
runs:
  using: "composite"
  steps: 
    - name: pull --rebase, then push
      uses: nick-invision/retry@14672906e672a08bd6eeb15720e9ed3ce869cdd4 # v2
      env:
        REMOTE: ${{ inputs.remote-name }}
        BRANCH: ${{ inputs.branch }}
      with:
        timeout_seconds: 60
        max_attempts: ${{ inputs.max-retries }}
        retry_on: error
        shell: bash
        command: |
          git pull "$REMOTE" "$BRANCH" --rebase
          git push
